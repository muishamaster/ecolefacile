# EcoleFacile.cd 🇨🇩

Plateforme simplifiée d'inscription scolaire pour les parents à Kinshasa, RDC.

## 🎯 Objectif

Permettre aux parents d'inscrire leurs enfants dans les écoles de Kinshasa 
en ligne, sans faire la queue, avec paiement par Mobile Money.

## 📋 Pages du site

- **Accueil** - Présentation et écoles populaires
- **Écoles** - Liste complète avec filtres par commune et niveau
- **Inscription** - Formulaire en 3 étapes
- **Confirmation** - Page après inscription réussie
- **Contact** - Formulaire de contact et informations
- **FAQ** - Questions fréquentes

## 🎨 Design

- Couleurs inspirées de la RDC (bleu Kinshasa, vert forêt, jaune soleil)
- Design mobile-first (optimisé pour les smartphones)
- Typographie : Inter
- Icons : Font Awesome

## 🚀 Technologies utilisées

- HTML5
- CSS3 (variables CSS, Flexbox, Grid)
- JavaScript vanilla
- Font Awesome 6

